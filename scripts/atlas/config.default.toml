# Atlas-Config (.ini-Style). Authored TOML -> build-config.mjs -> config.json (validiert).
# Scope-Keys: axis:<id> | atlas:<id> | group:<atlas>:<lobe> | area:<atlas>:<code>:<side>.
# preset = aktive Default-Basis; configurations.* = benannte Figure/Scene-Atome;
# presentation/learning.* = Sequenzen.
#
# SP5.1 Figure/Scene-Atom-Schema:
# Required fuer kanonische Atome:
#   label_de, title, section, view, camera, regions, colors,
#   visibility, cuts, overlay, sequencing, scopes.
# Optional bei Bedarf:
#   replaces_figure, facets, camera.pose, colors.groups, cuts.planes,
#   overlay.fallback_image.
# Bestehende SP3-Felder bleiben erhalten: presets, scopes, facets, view, camera
# und presentation/learning. localStorage ist nur UI-Override und nie kanonische
# Autorenquelle. Unbekannte Keys sind Build-Fehler.

preset = "kapitel11"

# --- Presets: benannte Default-Toggle-Sets ---------------------------------
[presets.kapitel11]
label_de = "Kapitel 11 (PFC/BG-Fokus)"
